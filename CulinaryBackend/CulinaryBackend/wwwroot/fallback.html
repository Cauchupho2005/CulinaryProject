<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Culinary Tour Guide - Thuyết minh</title>
    <style>
        /* Giao diện chuẩn Enterprise: Hiện đại, Mobile First */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 20px;
            background: #f0f2f5;
            color: #1c1e21;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }

        h1 {
            color: #e67e22;
            margin-bottom: 10px;
            font-size: 24px;
        }

        #status {
            font-style: italic;
            color: #64748b;
            margin-bottom: 20px;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }

        button {
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        #btnSpeak {
            background-color: #e67e22;
            color: white;
        }

            #btnSpeak:active {
                background-color: #d35400;
                transform: scale(0.98);
            }

        #btnMap {
            background-color: #2ecc71;
            color: white;
        }

            #btnMap:active {
                background-color: #27ae60;
                transform: scale(0.98);
            }

        .footer-note {
            margin-top: 30px;
            font-size: 12px;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="poiTitle">Đang kết nối...</h1>
        <p id="status">Đang lấy nội dung thuyết minh từ máy chủ...</p>

        <div id="content"></div>

        <div class="button-group">
            <button onclick="speak()" id="btnSpeak" style="display:none;">
                Nghe thuyết minh 🔊
            </button>
            <button onclick="openMap()" id="btnMap" style="display:none;">
                Chỉ đường đi 🗺️
            </button>
        </div>

        <p class="footer-note">Cảm ơn bạn đã sử dụng Culinary Tour Guide</p>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const poiId = urlParams.get('poiId');

        let ttsContent = "";
        let targetLat = 0;
        let targetLng = 0;

        // 1. Tải dữ liệu quán từ API (Dùng đường dẫn tương đối để tự nhận diện IP)
        async function loadPoiData() {
            if (!poiId) {
                document.getElementById('status').innerText = "Mã quán không hợp lệ.";
                return;
            }

            try {
                const response = await fetch(`/api/Poi/${poiId}?lang=vi`);
                if (!response.ok) throw new Error("Lỗi kết nối API");

                const data = await response.json();

                // Cập nhật giao diện
                document.getElementById('poiTitle').innerText = data.title;
                document.getElementById('status').innerText = "Sẵn sàng phục vụ!";

                // HIỆN CÁC NÚT KHI LOAD XONG
                document.getElementById('btnSpeak').style.display = 'flex';
                document.getElementById('btnMap').style.display = 'flex';

                // Lưu thông tin để dùng cho hàm con
                ttsContent = data.description;
                if (data.location && data.location.coordinates) {
                    targetLng = data.location.coordinates[0];
                    targetLat = data.location.coordinates[1];
                }

                // Ghi log lượt quét QR
                logQrScan();

            } catch (err) {
                document.getElementById('poiTitle').innerText = "Lỗi kết nối";
                document.getElementById('status').innerText = "Không thể lấy dữ liệu từ máy chủ.";
                console.error(err);
            }
        }

        // 2. Ghi nhận lượt quét vào Database
        function logQrScan() {
            let deviceId = localStorage.getItem("web_device_id") || "WEB_" + Math.random().toString(36).substr(2, 9);
            localStorage.setItem("web_device_id", deviceId);

            fetch(`/api/Log/qr-scan`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ poiId: poiId, deviceId: deviceId })
            }).catch(e => console.log("Lỗi ghi log"));
        }

        // 3. Phát âm thanh thuyết minh (TTS)
        function speak() {
            if ('speechSynthesis' in window && ttsContent) {
                window.speechSynthesis.cancel();
                const msg = new SpeechSynthesisUtterance(ttsContent);
                msg.lang = 'vi-VN';
                msg.rate = 0.9;
                window.speechSynthesis.speak(msg);
            } else {
                alert("Trình duyệt không hỗ trợ đọc âm thanh. Vui lòng dùng Chrome hoặc Safari.");
            }
        }

        // 4. Mở bản đồ chỉ đường
        function openMap() {
            if (targetLat !== 0 && targetLng !== 0) {
                const url = `https://www.google.com/maps/dir/?api=1&destination=${targetLat},${targetLng}`;
                window.open(url, '_blank');
            } else {
                alert("Quán này chưa cập nhật tọa độ GPS.");
            }
        }

        // Khởi chạy khi mở trang
        loadPoiData();
    </script>
</body>
</html>
